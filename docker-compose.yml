name: cellshop

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cellshop-app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3333
      HOST: 0.0.0.0
      DATABASE_URL: postgres://cellshop:cellshop@postgres:5432/cellshop
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://cellshop:cellshop@rabbitmq:5672
      
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: cellshop
      DATABASE_PASSWORD: cellshop
      DATABASE_NAME: cellshop
      DATABASE_SSL: "false"
  
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB_NUMBER: 0
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cellshop-worker
    command: npm run worker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgres://cellshop:cellshop@postgres:5432/cellshop
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://cellshop:cellshop@rabbitmq:5672

      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: cellshop
      DATABASE_PASSWORD: cellshop
      DATABASE_NAME: cellshop
      DATABASE_SSL: "false"

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB_NUMBER: 0
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: cellshop-postgres
    environment:
      POSTGRES_USER: cellshop
      POSTGRES_PASSWORD: cellshop
      POSTGRES_DB: cellshop
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cellshop -d cellshop"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cellshop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management
    container_name: cellshop-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cellshop
      RABBITMQ_DEFAULT_PASS: cellshop
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
